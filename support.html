<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поддержать — Свиные рыльца</title>
    <style>
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .support-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            max-width: 90%;
        }

        .support-img {
            max-width: 100%;
            max-height: 70vh;
            height: auto;
            object-fit: contain;
            border: 6px solid #ffb7c5;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 138, 158, 0.15);
            display: block;
        }

        .btn-back {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background-color: #ffffff;
            color: #ff8a9e;
            border: 4px solid #ff8a9e;
            padding: 12px 35px;
            font-size: 22px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-back:hover {
            background-color: #ff8a9e;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="support-container">
        <img src="support.png" alt="Донат" class="support-img">
        
        <a href="index.html" class="btn-back">НАЗАД НА САЙТ</a>
    </div>

</body>
</html>
